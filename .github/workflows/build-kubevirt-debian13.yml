name: "Debian 13 KubeVirt containerDisk image"

"on":
  workflow_dispatch:
  push:
    # Configures this workflow to run every time a change is pushed to the branch called `main`.
    branches: ['main']
    # Pattern matched specific path
    paths:
      - "kubevirt/Containerfile.debian13"
      - ".github/workflows/build-kubevirt-debian13.yml"

jobs:

  build-vm-images:
    runs-on: "ubuntu-24.04"
    permissions:
      contents: "read"
      packages: "write"
      attestations: "write"
      id-token: "write"

    steps:
      - name: "Checkout repository"
        uses: "actions/checkout@v6"

      - name: "Log in to the Container registry"
        run: podman login ghcr.io --username "${{ github.actor }}" --password "${{ secrets.GITHUB_TOKEN }}"

      - name: "Build & push kubevirt VM images"
        run: |
          make .build-push-vm VMPLATFORMS=debian13
